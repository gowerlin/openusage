name: Pre-Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pre-release version (for example 0.6.25-pre.1). Leave empty to auto-increment."
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          fetch-depth: 1

      - name: Fetch tags
        run: git fetch --tags --no-recurse-submodules

      - name: Resolve pre-release version
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ inputs.version }}"
          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="${INPUT_VERSION#v}"
          else
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1)
            if [[ -z "$LATEST_TAG" ]]; then
              LATEST_TAG="v0.0.0"
            fi

            LATEST_VERSION="${LATEST_TAG#v}"
            BASE_VERSION="${LATEST_VERSION%%-*}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            PATCH=$((PATCH + 1))
            BASE="${MAJOR}.${MINOR}.${PATCH}"

            PRE_NUM=1
            while git tag -l "v${BASE}-pre.${PRE_NUM}" | grep -q .; do
              PRE_NUM=$((PRE_NUM + 1))
            done

            VERSION="${BASE}-pre.${PRE_NUM}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+-pre\.[0-9]+$ ]]; then
            echo "Invalid pre-release version: $VERSION (expected MAJOR.MINOR.PATCH-pre.N)"
            exit 1
          fi

          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved pre-release: $TAG"

  publish:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: "--target x86_64-pc-windows-msvc --bundles nsis"
            rust_targets: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - run: bun install

      - name: Sync pre-release version
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require("fs");
          const version = process.env.RELEASE_VERSION;

          function updateJson(path, updater) {
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            updater(data);
            fs.writeFileSync(path, `${JSON.stringify(data, null, 2)}\n`);
          }

          updateJson("package.json", (data) => {
            data.version = version;
          });
          updateJson("src-tauri/tauri.conf.json", (data) => {
            data.version = version;
          });

          const cargoPath = "src-tauri/Cargo.toml";
          const cargo = fs.readFileSync(cargoPath, "utf8");
          fs.writeFileSync(
            cargoPath,
            cargo.replace(/^version = ".*"$/m, `version = "${version}"`),
          );
          NODE

      - name: Bundle plugins
        run: bun run bundle:plugins
      - name: Verify bundled plugins
        shell: bash
        run: |
          COUNT=$(find src-tauri/resources/bundled_plugins -maxdepth 2 -name plugin.json | wc -l | tr -d ' ')
          if [[ "$COUNT" -lt 1 ]]; then
            echo "No bundled plugins found under src-tauri/resources/bundled_plugins."
            exit 1
          fi

      - name: Configure Windows build environment
        shell: pwsh
        run: |
          $candidates = @(
            "${env:ProgramFiles}\LLVM\bin",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Enterprise\VC\Tools\Llvm\x64\bin",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Professional\VC\Tools\Llvm\x64\bin",
            "${env:ProgramFiles}\Microsoft Visual Studio\2022\Community\VC\Tools\Llvm\x64\bin",
            "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\BuildTools\VC\Tools\Llvm\x64\bin"
          )
          $libclangPath = $candidates |
            Where-Object { Test-Path (Join-Path $_ 'libclang.dll') } |
            Select-Object -First 1

          if (-not $libclangPath) {
            throw "libclang.dll not found. Install LLVM or Visual Studio LLVM tools."
          }

          "LIBCLANG_PATH=$libclangPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "Using LIBCLANG_PATH=$libclangPath"

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$RELEASE_TAG" ]]; then
            echo "Missing RELEASE_TAG."
            exit 1
          fi
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-pre\.[0-9]+$ ]]; then
            echo "Invalid RELEASE_TAG: $RELEASE_TAG (expected vMAJOR.MINOR.PATCH-pre.N)"
            exit 1
          fi

      - name: Validate app version matches tag
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${RELEASE_TAG#v}"

          TAURI_CONF_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          CARGO_VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' ./src-tauri/Cargo.toml)
          PKG_VERSION=$(node -p 'require("./package.json").version')

          if [[ "$TAURI_CONF_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/tauri.conf.json version ($TAURI_CONF_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "src-tauri/Cargo.toml version ($CARGO_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "package.json version ($PKG_VERSION) != tag version ($TAG_VERSION)"
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseDraft: false
          prerelease: true
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

      - name: Verify updater assets uploaded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          ASSETS=$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' | tr -d '\r')

          printf '%s\n' "$ASSETS" | grep -Fxq 'latest.json' || { echo "Missing updater manifest: latest.json"; exit 1; }
          printf '%s\n' "$ASSETS" | grep -Eq '\.sig$' || { echo "Missing updater signatures (.sig)"; exit 1; }
